services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    container_name: Catalogo
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db
    networks:
      - network_app

  webserver:
    image: nginx:latest
    container_name: nginx_Catalogo
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - network_app

  db:
    image: mariadb:10.5
    container_name: db_Catalogo
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - network_app

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_Catalogo
    ports:
      - '8001:80'
    environment:
      - PMA_ARBITRARY=1
    networks:
      - network_app

networks:
  network_app:
    driver: bridge
